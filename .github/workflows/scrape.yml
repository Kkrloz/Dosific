name: Scrape prices

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Call scrape API
        run: |
          curl -X POST "${{ secrets.VERCEL_URL }}/api/scrape" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
